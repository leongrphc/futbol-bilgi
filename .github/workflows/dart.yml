name: iOS-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest

    defaults:
      run:
        working-directory: futbol-bilgi/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: x64

      - run: flutter pub get

      - run: pod repo update
        working-directory: futbol-bilgi/mobile/ios

      - run: flutter build ios --release --no-codesign

      - run: mkdir -p Payload
        working-directory: futbol-bilgi/mobile/build/ios/iphoneos

      - run: mv Runner.app Payload/
        working-directory: futbol-bilgi/mobile/build/ios/iphoneos

      - name: Zip output
        run: zip -qq -r -9 Latest.ipa Payload
        working-directory: futbol-bilgi/mobile/build/ios/iphoneos

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: futbol-bilgi/mobile/build/ios/iphoneos/Latest.ipa
          tag: v1.0
          overwrite: true
          body: "This is first release"
